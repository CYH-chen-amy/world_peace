<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>成為他人的北極星 — 管理後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --night-deep:#060B1C;
    --night:#0E1834;
    --night-light:#1A2B4F;
    --night-mid:#243B6E;
    --star-gold:#E8B647;
    --star-bright:#FFE8A8;
    --star-glow:#FFD668;
    --text-cream:#F2EAD3;
    --text-soft:#A8B0CC;
    --text-dim:#6E7A98;
    --border-faint:rgba(232,182,71,.22);
    --border-soft:rgba(232,182,71,.45);
    --A:#FFD668; --B:#E8B647; --C:#C99030; --D:#9A6A1F;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    color:var(--text-cream);
    background:var(--night-deep);
    background-image:
      radial-gradient(ellipse 900px 700px at 75% 18%, rgba(46, 70, 130, 0.5), transparent 62%),
      radial-gradient(ellipse 700px 500px at 18% 85%, rgba(28, 45, 92, 0.55), transparent 65%),
      linear-gradient(180deg, #060B1C 0%, #0E1834 50%, #060B1C 100%);
    background-attachment:fixed;
    min-height:100vh;position:relative;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
    background-image:
      radial-gradient(1px 1px at 10% 8%, #fff, transparent),
      radial-gradient(1px 1px at 78% 12%, rgba(255,255,255,.85), transparent),
      radial-gradient(1px 1px at 45% 25%, #fff, transparent),
      radial-gradient(1px 1px at 90% 38%, rgba(255,255,255,.7), transparent),
      radial-gradient(1px 1px at 22% 42%, #fff, transparent),
      radial-gradient(1px 1px at 65% 50%, rgba(255,255,255,.6), transparent),
      radial-gradient(1px 1px at 8% 65%, #fff, transparent),
      radial-gradient(1px 1px at 88% 70%, rgba(255,255,255,.85), transparent),
      radial-gradient(1.5px 1.5px at 38% 78%, rgba(255,232,168,.7), transparent),
      radial-gradient(1.5px 1.5px at 72% 88%, rgba(255,232,168,.85), transparent),
      radial-gradient(2px 2px at 55% 35%, rgba(255,232,168,.85), transparent);
  }
  .filters{position:absolute;width:0;height:0}

  /* clock */
  .clock{
    position:fixed;top:1.1rem;right:1.2rem;z-index:50;
    font-family:"Inter",sans-serif;
    font-weight:400;font-size:1.1rem;letter-spacing:.06em;
    background:rgba(14, 24, 52, 0.7);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    padding:.5rem 1rem;border-radius:999px;
    border:1px solid var(--border-soft);
    box-shadow:0 4px 18px rgba(0,0,0,.4);
    color:var(--star-bright);
    font-feature-settings:"tnum";
  }

  main{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:4rem 1.5rem 5rem}

  header.hero{margin-bottom:3rem;text-align:center}
  .eyebrow{
    font-family:"Inter","Noto Sans TC",sans-serif;
    font-weight:300;
    color:var(--star-gold);font-size:.85rem;letter-spacing:.45em;
    text-transform:uppercase;margin-bottom:1rem;opacity:.85;
  }
  h1{
    font-weight:700;
    font-size:clamp(2rem,4.5vw,2.7rem);letter-spacing:.16em;
    color:var(--text-cream);
    text-shadow:0 0 24px rgba(232,182,71,.2);
  }
  h1::after{
    content:"";display:block;width:60px;height:1px;
    margin:1.2rem auto 0;
    background:linear-gradient(90deg, transparent, var(--star-gold), transparent);
  }
  .sub{
    font-family:"Cormorant Garamond",serif;font-style:italic;
    margin-top:.9rem;color:var(--star-bright);font-size:1.05rem;letter-spacing:.08em;
    opacity:.9;
  }

  /* gate */
  .gate{
    max-width:380px;margin:6rem auto;padding:2.6rem 2rem;
    background:rgba(14, 24, 52, 0.65);
    border:1px solid var(--border-soft);
    border-radius:10px;
    text-align:center;
    box-shadow:0 12px 40px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,232,168,.06);
    backdrop-filter:blur(8px);
  }
  .gate label{display:block;font-size:.85rem;color:var(--text-soft);margin-bottom:.55rem;letter-spacing:.18em;font-weight:400}
  .gate input{
    width:100%;padding:.7rem .9rem;font-family:inherit;font-size:1.05rem;font-weight:400;
    border:none;border-bottom:1.5px solid rgba(168,176,204,.4);background:transparent;
    outline:none;color:var(--text-cream);margin-bottom:1.4rem;
    text-align:center;letter-spacing:.5em;
  }
  .gate input:focus{border-bottom-color:var(--star-gold)}
  .btn{
    display:inline-flex;align-items:center;gap:.5rem;
    font-family:inherit;font-weight:500;font-size:.95rem;letter-spacing:.2em;
    color:var(--night-deep);
    background:linear-gradient(135deg, var(--star-gold), var(--star-glow));
    border:none;
    padding:.7rem 1.7rem;cursor:pointer;border-radius:999px;
    box-shadow:0 4px 22px rgba(232,182,71,.3);
    transition:transform .25s,box-shadow .25s;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,182,71,.5)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{
    background:transparent;color:var(--star-bright);
    border:1px solid var(--border-soft);
    box-shadow:none;
  }
  .btn.ghost:hover{background:rgba(232,182,71,.1);border-color:var(--star-gold);transform:none;box-shadow:0 0 18px rgba(232,182,71,.2)}

  /* summary cards */
  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.2rem;margin-bottom:3rem}
  .card{
    background:rgba(20, 35, 64, 0.5);
    border:1px solid var(--border-faint);
    border-radius:10px;
    padding:1.4rem 1.5rem;
    position:relative;
    backdrop-filter:blur(4px);
    transition:border-color .25s,box-shadow .25s;
  }
  .card:hover{border-color:var(--star-gold);box-shadow:0 0 24px rgba(232,182,71,.15)}
  .card::before{
    content:"";position:absolute;top:0;left:1rem;right:1rem;height:1px;
    background:linear-gradient(90deg, transparent, var(--star-gold), transparent);
  }
  .card .k{font-size:.78rem;color:var(--text-soft);letter-spacing:.2em;margin-bottom:.5rem;text-transform:uppercase;font-weight:400}
  .card .v{
    font-family:"Cormorant Garamond",serif;
    font-style:italic;
    font-weight:500;
    font-size:2.5rem;line-height:1;color:var(--star-bright);
    letter-spacing:-.01em;
  }
  .card .v small{font-size:.95rem;color:var(--text-soft);font-weight:400;margin-left:.3rem;letter-spacing:.05em;font-style:normal;font-family:inherit}

  section.block{
    background:rgba(14, 24, 52, 0.5);
    border:1px solid var(--border-faint);
    border-radius:10px;
    padding:1.8rem 1.7rem;
    margin-bottom:2rem;
    backdrop-filter:blur(4px);
  }
  section.block h2{
    font-size:1.25rem;font-weight:500;
    letter-spacing:.16em;margin-bottom:1.4rem;
    display:flex;align-items:baseline;justify-content:space-between;
    gap:1rem;flex-wrap:wrap;
    color:var(--text-cream);
  }
  section.block h2 small{
    font-family:"Cormorant Garamond",serif;font-style:italic;
    font-weight:400;
    font-size:.95rem;color:var(--star-gold);letter-spacing:.08em;
    text-transform:none;
    opacity:.85;
  }

  .qstat{margin-bottom:1.8rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(168,176,204,.12)}
  .qstat:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
  .qstat .qt{
    font-size:.98rem;line-height:1.65;color:var(--text-cream);font-weight:500;
    margin-bottom:1rem;
    display:flex;align-items:flex-start;gap:.6rem;flex-wrap:wrap;
  }
  .qstat .qt .qnum{
    font-family:"Cormorant Garamond",serif;font-style:italic;
    font-weight:500;
    color:var(--star-gold);font-size:1.2rem;
    flex-shrink:0;
  }
  .qstat .qt .multi-tag{
    display:inline-block;
    background:rgba(232,182,71,.15);
    color:var(--star-bright);
    border:1px solid var(--border-soft);
    padding:.15rem .55rem;
    border-radius:999px;
    font-size:.7rem;
    letter-spacing:.18em;
    font-weight:500;
    margin-left:.4rem;
    vertical-align:middle;
  }
  .bars{display:flex;flex-direction:column;gap:.6rem}
  .bar-row{display:flex;align-items:center;gap:.85rem;font-size:.92rem}
  .bar-letter{
    width:1.7rem;height:1.7rem;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:"Cormorant Garamond",serif;font-style:italic;
    font-weight:500;
    color:var(--night-deep);font-size:.95rem;
  }
  .bar-letter.A{background:var(--A)}
  .bar-letter.B{background:var(--B)}
  .bar-letter.C{background:var(--C);color:var(--text-cream)}
  .bar-letter.D{background:var(--D);color:var(--text-cream)}
  .bar-text{flex:1;min-width:0;color:var(--text-soft);font-size:.83rem;line-height:1.4;font-weight:400}
  .bar-wrap{
    flex:0 0 45%;height:1.4rem;
    background:rgba(168,176,204,.08);border-radius:4px;
    overflow:hidden;position:relative;
    border:1px solid rgba(168,176,204,.1);
  }
  .bar-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.2,.7,.2,1)}
  .bar-fill.A{background:linear-gradient(90deg, var(--A), #FFE8A8)}
  .bar-fill.B{background:linear-gradient(90deg, var(--B), #F5C754)}
  .bar-fill.C{background:linear-gradient(90deg, var(--C), #DCA34A)}
  .bar-fill.D{background:linear-gradient(90deg, var(--D), #BB853D)}
  .bar-pct{flex:0 0 4.5rem;text-align:right;font-family:"JetBrains Mono",monospace;font-size:.88rem;color:var(--star-bright);font-weight:400}

  .attendees{display:flex;flex-wrap:wrap;gap:.55rem}
  .chip{
    background:linear-gradient(135deg, rgba(232,182,71,.18), rgba(255,232,168,.08));
    color:var(--star-bright);
    border:1px solid var(--border-soft);
    padding:.45rem .9rem;border-radius:999px;
    font-size:.92rem;font-weight:500;
  }

  .table-wrap{overflow-x:auto}

  /* response cards */
  .resp-cards{display:flex;flex-direction:column;gap:1.1rem}
  .resp-card{
    background:rgba(20, 35, 64, 0.4);
    border:1px solid var(--border-faint);
    border-radius:10px;
    padding:1.3rem 1.5rem;
    transition:border-color .25s,box-shadow .25s;
  }
  .resp-card:hover{border-color:var(--border-soft);box-shadow:0 0 18px rgba(232,182,71,.1)}
  .resp-card-head{
    display:flex;align-items:baseline;justify-content:space-between;
    gap:1rem;flex-wrap:wrap;
    padding-bottom:.85rem;margin-bottom:.95rem;
    border-bottom:1px dashed rgba(232,182,71,.18);
  }
  .resp-name{
    font-size:1.15rem;font-weight:500;
    color:var(--star-bright);
    letter-spacing:.05em;
    display:flex;align-items:center;gap:.6rem;
  }
  .resp-idx{
    font-family:"Cormorant Garamond",serif;font-style:italic;
    font-weight:400;font-size:.95rem;color:var(--text-dim);
    margin-right:.3rem;
  }
  .resp-attend{
    color:var(--star-gold);font-size:1.1rem;
    filter:drop-shadow(0 0 6px rgba(232,182,71,.5));
  }
  .resp-meta{
    font-family:"JetBrains Mono",monospace;font-size:.78rem;
    color:var(--text-dim);letter-spacing:.05em;
    display:flex;gap:.9rem;flex-wrap:wrap;
  }
  .resp-qa{display:flex;flex-direction:column;gap:.55rem}
  .resp-qa-row{
    display:flex;gap:.7rem;align-items:flex-start;
    font-size:.93rem;line-height:1.65;
  }
  .resp-qlabel{
    flex-shrink:0;
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--star-gold);font-size:1rem;font-weight:500;
    min-width:1.8rem;
  }
  .resp-qans{flex:1;color:var(--text-cream)}
  .resp-qans.empty{color:var(--text-dim);font-style:italic}
  .resp-qans .multi-line{display:block;margin-bottom:.2rem}
  .resp-qans .multi-line:last-child{margin-bottom:0}
  table{width:100%;border-collapse:collapse;font-size:.92rem}
  th,td{padding:.7rem .8rem;text-align:left;border-bottom:1px solid rgba(168,176,204,.1)}
  th{
    font-weight:500;letter-spacing:.12em;font-size:.78rem;
    color:var(--text-soft);text-transform:uppercase;
    border-bottom:1px solid var(--border-soft);
  }
  td{color:var(--text-cream)}
  td.ans{
    font-family:"Cormorant Garamond",serif;
    font-style:italic;
    font-weight:500;
    font-size:1.05rem;text-align:center;
  }
  td.ans.A{color:var(--A)}
  td.ans.B{color:var(--B)}
  td.ans.C{color:#E8B647}
  td.ans.D{color:#C99030}
  td.attend{font-size:1.1rem;text-align:center;color:var(--star-gold)}
  td.time,td.dur{font-family:"JetBrains Mono",monospace;font-size:.82rem;color:var(--text-soft)}
  td b{font-weight:500;color:var(--star-bright)}

  .toolbar{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
  .empty{text-align:center;padding:3rem 1rem;color:var(--text-soft);font-weight:400;font-style:italic}
  .loading{text-align:center;padding:4rem 1rem;color:var(--text-soft);font-size:1.05rem;font-weight:400;font-style:italic}
  .err{color:#FF8B7A;text-align:center;margin-top:1rem}

  @media(max-width:640px){
    main{padding:3rem 1rem 4rem}
    .bar-wrap{flex:0 0 35%}
    .bar-text{display:none}
  }
</style>
</head>

<main>
  <header class="hero">
    <div class="eyebrow">Admin · Inner Cultivation · W13</div>
    <h1>成為他人的北極星</h1>

        <div class="card"><div class="k">最近一筆</div><div class="v" id="s-last" style="font-size:1.4rem">—</div></div>

      <section class="block">
        <h2>各題分布 <small>Distribution per Question</small></h2>
        <div id="qstats"></div>
      </section>

      <section class="block">
        <h2>
          週四社課出席名單 <small>RSVP for 5/21</small>

      <section class="block">
        <h2>

            <button class="btn ghost" id="export-csv">匯出 CSV</button>
            <button class="btn ghost" id="refresh">重新整理</button>
          </span>
        </h2>
        <div id="resp-cards" class="resp-cards"></div>
      </section>
    </div>
  </div>
</main>

<script>
const ADMIN_PASSWORD = "000000";
const COLLECTION = "responses_w13";

const QUESTIONS = [
  { q:"你曾經「不求回報」地幫助過別人嗎？事後的感受是？", multi:false,
    opts:["能量滿滿","一半一半","禮尚往來","務實至上"],

/* clock */
const clockEl = document.getElementById("clock");
function updateClock(){
  const d = new Date();
  clockEl.textContent = String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
}
updateClock(); setInterval(updateClock, 15000);

function fmtDur(ms){
  const s = Math.floor(ms/1000);
  return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
}
function fmtTime(ts){
  if(!ts) return "—";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

/* gate */
const gate = document.getElementById("gate");
const dash = document.getElementById("dash");
const pw = document.getElementById("pw");
document.getElementById("pw-go").addEventListener("click", tryUnlock);
pw.addEventListener("keydown", e => { if(e.key === "Enter") tryUnlock(); });
function tryUnlock(){
  if(pw.value === ADMIN_PASSWORD){
    sessionStorage.setItem("adm_w13_ok","1");
    showDash();
  } else {
    document.getElementById("pw-err").textContent = "密碼錯誤";
  }
}
function showDash(){
  gate.style.display = "none";
  dash.style.display = "block";
  loadData();
}
if(sessionStorage.getItem("adm_w13_ok") === "1") showDash();

/* load */
let responses = [];
async function loadData(){
  const loading = document.getElementById("loading");
  const errEl = document.getElementById("err-load");
  const content = document.getElementById("content");
  loading.style.display = "block";
  content.style.display = "none";
  errEl.textContent = "";
  try {
    await window.__fbReady;
    const { db, collection, getDocs, query, orderBy } = window.__fb;
    const q = query(collection(db, COLLECTION), orderBy("submitted_at", "desc"));
    const snap = await getDocs(q);
    responses = [];
    snap.forEach(doc => responses.push({ id:doc.id, ...doc.data() }));
    render();
    loading.style.display = "none";
    content.style.display = "block";
  } catch(e){
    console.error(e);
    loading.style.display = "none";
    errEl.textContent = "讀取失敗：" + (e.code || e.message);
  }
}
document.getElementById("refresh").addEventListener("click", loadData);

function render(){
  const total = responses.length;
  const attending = responses.filter(r => r.attending);
  const avg = total ? responses.reduce((a,r)=> a+(r.duration_ms||0),0)/total : 0;
  const last = responses[0]?.submitted_at;

  document.getElementById("s-total").innerHTML = total + '<small>份</small>';
  const pctStr = total ? ` <small>(${Math.round(attending.length/total*100)}%)</small>` : "";
  document.getElementById("s-attend").innerHTML = attending.length + '<small>人</small>' + pctStr;
  document.getElementById("s-avg").textContent = fmtDur(avg);
  document.getElementById("s-last").textContent = fmtTime(last);

  const wrap = document.getElementById("qstats");
  wrap.innerHTML = "";
  QUESTIONS.forEach((q, qi) => {
    const counts = {A:0,B:0,C:0,D:0};
    let validRespondents = 0;
    responses.forEach(r => {
      const a = r.answers?.[qi];
      const letters = Array.isArray(a)
        ? a
        : (typeof a === "string" && a.includes(","))
          ? a.split(",")
          : (typeof a === "string" && a)
            ? [a]
            : [];
      let any = false;
      letters.forEach(L => { if(counts[L] !== undefined){ counts[L]++; any = true; } });
      if(any) validRespondents++;
    });
    // For multi-select: percentage = pickers / valid respondents (can sum > 100%)
    // For single-select: percentage = pickers / total picks = pickers / valid respondents
    const denom = q.multi ? validRespondents : validRespondents;
    const div = document.createElement("div");
    div.className = "qstat";
    div.innerHTML = `
      <div class="qt">
        <span class="qnum">${String(qi+1).padStart(2,"0")}</span>
        <span>${q.q}${q.multi ? '<span class="multi-tag">可複選</span>' : ''}</span>
      </div>
      <div class="bars">
        ${["A","B","C","D"].map((L,i)=>{
          const c = counts[L];
          const pct = denom ? c/denom*100 : 0;
          return `
          <div class="bar-row">
            <div class="bar-letter ${L}">${L}</div>
            <div class="bar-text">${q.opts[i]}</div>
            <div class="bar-wrap"><div class="bar-fill ${L}" style="width:0%"></div></div>
            <div class="bar-pct">${c} · ${pct.toFixed(0)}%</div>
          </div>`;
        }).join("")}
      </div>
    `;
    wrap.appendChild(div);
  });
  requestAnimationFrame(() => {
    wrap.querySelectorAll(".bar-row").forEach(row => {
      const text = row.querySelector(".bar-pct").textContent;
      const m = text.match(/(\d+)%$/);
      if(m) row.querySelector(".bar-fill").style.width = m[1] + "%";
    });
  });

  const list = document.getElementById("attend-list");
  if(attending.length === 0){
    list.innerHTML = '<div class="empty">尚無人勾選出席</div>';
  } else {
    list.innerHTML = attending.map(r => `<span class="chip">${escapeHTML(r.name)}</span>`).join("");
  }

  const cardWrap = document.getElementById("resp-cards");
  if(total === 0){
    cardWrap.innerHTML = '<div class="empty">尚無資料</div>';
    return;
  }
  cardWrap.innerHTML = responses.map((r,i) => {
    const qa = [0,1,2,3,4].map(j => {
      const a = r.answers?.[j];
      const q = QUESTIONS[j];
      // 取得選項對應的完整文字
      const letters = Array.isArray(a)
        ? a
        : (typeof a === "string" && a.includes(","))
          ? a.split(",")
          : (typeof a === "string" && a)
            ? [a]
            : [];
      if(letters.length === 0){
        return `<div class="resp-qa-row">
          <div class="resp-qlabel">Q${j+1}</div>
          <div class="resp-qans empty">—</div>
        </div>`;
      }
      const texts = letters.map(L => {
        const idx = "ABCD".indexOf(L);
        if(idx < 0 || !q.optsFull[idx]) return L;
        return escapeHTML(q.optsFull[idx]);
      });
      const ansHTML = q.multi && texts.length > 1
        ? texts.map(t => `<span class="multi-line">• ${t}</span>`).join("")
        : texts.join("");
      return `<div class="resp-qa-row">
        <div class="resp-qlabel">Q${j+1}</div>
        <div class="resp-qans">${ansHTML}</div>
      </div>`;
    }).join("");

    return `
    <div class="resp-card">
      <div class="resp-card-head">
        <div class="resp-name">
          <span class="resp-idx">#${i+1}</span>
          <span>${escapeHTML(r.name||"")}</span>
          ${r.attending ? '<span class="resp-attend" title="會出席週四社課">✦</span>' : ''}
        </div>
        <div class="resp-meta">
          <span>${fmtDur(r.duration_ms||0)}</span>
          <span>${fmtTime(r.submitted_at)}</span>
        </div>
      </div>
      <div class="resp-qa">${qa}</div>
    </div>`;
  }).join("");
}

function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

document.getElementById("copy-attend").addEventListener("click", async () => {
  const names = responses.filter(r=>r.attending).map(r=>r.name);
  if(names.length === 0){ alert("沒有人勾選出席"); return; }
  try{
    await navigator.clipboard.writeText(names.join("\n"));
    const btn = document.getElementById("copy-attend");
    const orig = btn.textContent;
    btn.textContent = "已複製 ✓";
    setTimeout(()=> btn.textContent = orig, 1500);
  } catch{
    alert(names.join("\n"));
  }
});

document.getElementById("export-csv").addEventListener("click", () => {
  if(responses.length === 0){ alert("沒有資料"); return; }
  const header = ["#","姓名","Q1","Q2","Q3","Q4(可複選)","Q5","週四出席","用時(秒)","送出時間"];
  const rows = responses.map((r,i)=>[
    i+1,
    r.name||"",
    ...[0,1,2,3,4].map(j => {
      const a = r.answers?.[j];
      if(Array.isArray(a)) return a.join(";");
      if(typeof a === "string") return a.replace(/,/g, ";");
      return "";
    }),
    r.attending ? "是" : "否",
    Math.round((r.duration_ms||0)/1000),
    r.submitted_at ? (r.submitted_at.toDate ? r.submitted_at.toDate() : new Date(r.submitted_at)).toLocaleString("zh-TW") : ""
  ]);
  const csv = [header, ...rows]
    .map(row => row.map(v => `"${String(v).replace(/"/g,'""')}"`).join(","))
    .join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type:"text/csv;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `北極星_W13_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
});
</script>
